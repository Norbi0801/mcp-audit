<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F81F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3FB950;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#3FB950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3FB950;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M64 8 L112 28 L112 56 C112 84 92 108 64 120 C36 108 16 84 16 56 L16 28 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="4" stroke-linejoin="round"/>

  <!-- Inner shield fill (subtle) -->
  <path d="M64 14 L106 32 L106 56 C106 80 88 102 64 114 C40 102 22 80 22 56 L22 32 Z"
        fill="#2F81F7" fill-opacity="0.08"/>

  <!-- Scan lines (horizontal, centered in shield) -->
  <line x1="36" y1="44" x2="92" y2="44" stroke="url(#scanGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="32" y1="56" x2="96" y2="56" stroke="url(#scanGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="36" y1="68" x2="92" y2="68" stroke="url(#scanGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="80" x2="86" y2="80" stroke="url(#scanGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Central scan pulse / crosshair -->
  <circle cx="64" cy="56" r="12" fill="none" stroke="#3FB950" stroke-width="2" opacity="0.7"/>
  <circle cx="64" cy="56" r="4" fill="#3FB950" opacity="0.9"/>

  <!-- Crosshair lines -->
  <line x1="64" y1="40" x2="64" y2="48" stroke="#3FB950" stroke-width="1.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="64" y2="72" stroke="#3FB950" stroke-width="1.5" opacity="0.6"/>
  <line x1="48" y1="56" x2="56" y2="56" stroke="#3FB950" stroke-width="1.5" opacity="0.6"/>
  <line x1="72" y1="56" x2="80" y2="56" stroke="#3FB950" stroke-width="1.5" opacity="0.6"/>
</svg>
