<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 128" width="420" height="128">
  <!-- Monochrome dark variant — for light backgrounds -->

  <!-- Shield body -->
  <g transform="translate(0, 0)">
    <path d="M64 8 L112 28 L112 56 C112 84 92 108 64 120 C36 108 16 84 16 56 L16 28 Z"
          fill="none" stroke="#1C2128" stroke-width="4" stroke-linejoin="round"/>

    <path d="M64 14 L106 32 L106 56 C106 80 88 102 64 114 C40 102 22 80 22 56 L22 32 Z"
          fill="#1C2128" fill-opacity="0.05"/>

    <!-- Scan lines -->
    <line x1="36" y1="44" x2="92" y2="44" stroke="#1C2128" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="32" y1="56" x2="96" y2="56" stroke="#1C2128" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="36" y1="68" x2="92" y2="68" stroke="#1C2128" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="42" y1="80" x2="86" y2="80" stroke="#1C2128" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

    <!-- Central scan pulse -->
    <circle cx="64" cy="56" r="12" fill="none" stroke="#1C2128" stroke-width="2" opacity="0.4"/>
    <circle cx="64" cy="56" r="4" fill="#1C2128" opacity="0.6"/>

    <!-- Crosshair -->
    <line x1="64" y1="40" x2="64" y2="48" stroke="#1C2128" stroke-width="1.5" opacity="0.3"/>
    <line x1="64" y1="64" x2="64" y2="72" stroke="#1C2128" stroke-width="1.5" opacity="0.3"/>
    <line x1="48" y1="56" x2="56" y2="56" stroke="#1C2128" stroke-width="1.5" opacity="0.3"/>
    <line x1="72" y1="56" x2="80" y2="56" stroke="#1C2128" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Text -->
  <g transform="translate(136, 0)">
    <text x="0" y="58" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#1C2128" letter-spacing="-0.5">MCP</text>
    <text x="0" y="96" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="38" font-weight="400" fill="#1C2128" opacity="0.5" letter-spacing="0.5">Scanner</text>
  </g>
</svg>
