<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F81F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3FB950;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#3FB950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3FB950;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#2F81F7;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#2F81F7;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle scan line background -->
  <g opacity="0.025" stroke="#3FB950" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>

  <!-- Shield icon (left-center) -->
  <g transform="translate(80, 135) scale(2.8)">
    <path d="M64 8 L112 28 L112 56 C112 84 92 108 64 120 C36 108 16 84 16 56 L16 28 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M64 14 L106 32 L106 56 C106 80 88 102 64 114 C40 102 22 80 22 56 L22 32 Z"
          fill="#2F81F7" fill-opacity="0.05"/>
    <line x1="36" y1="44" x2="92" y2="44" stroke="url(#scanGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="32" y1="56" x2="96" y2="56" stroke="url(#scanGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="36" y1="68" x2="92" y2="68" stroke="url(#scanGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="42" y1="80" x2="86" y2="80" stroke="url(#scanGrad)" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
    <circle cx="64" cy="56" r="12" fill="none" stroke="#3FB950" stroke-width="1.2" opacity="0.7"/>
    <circle cx="64" cy="56" r="4" fill="#3FB950" opacity="0.9"/>
    <line x1="64" y1="40" x2="64" y2="48" stroke="#3FB950" stroke-width="1" opacity="0.5"/>
    <line x1="64" y1="64" x2="64" y2="72" stroke="#3FB950" stroke-width="1" opacity="0.5"/>
    <line x1="48" y1="56" x2="56" y2="56" stroke="#3FB950" stroke-width="1" opacity="0.5"/>
    <line x1="72" y1="56" x2="80" y2="56" stroke="#3FB950" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Right content area -->
  <g transform="translate(480, 0)">
    <!-- Title -->
    <text x="0" y="175" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="64" font-weight="700" fill="#F0F6FC" letter-spacing="-1">
      MCP Scanner
    </text>

    <!-- Subtitle -->
    <text x="0" y="225" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="28" font-weight="400" fill="#8B949E">
      "npm audit" for MCP servers
    </text>

    <!-- Accent line -->
    <rect x="0" y="248" width="60" height="3" rx="1.5" fill="#2F81F7"/>

    <!-- Feature list -->
    <g font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20">
      <text x="0" y="300" fill="#3FB950" font-weight="600">&#x2713;</text>
      <text x="28" y="300" fill="#C9D1D9">OWASP MCP Top 10 coverage</text>

      <text x="0" y="340" fill="#3FB950" font-weight="600">&#x2713;</text>
      <text x="28" y="340" fill="#C9D1D9">JSON, SARIF, Markdown output</text>

      <text x="0" y="380" fill="#3FB950" font-weight="600">&#x2713;</text>
      <text x="28" y="380" fill="#C9D1D9">CI/CD ready (GitHub Actions)</text>

      <text x="0" y="420" fill="#3FB950" font-weight="600">&#x2713;</text>
      <text x="28" y="420" fill="#C9D1D9">Open source (AGPL-3.0)</text>
    </g>

    <!-- Install command -->
    <g transform="translate(0, 455)">
      <rect width="420" height="44" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
      <text x="16" y="29" font-family="'JetBrains Mono', 'Fira Code', monospace"
            font-size="17" fill="#8B949E">$</text>
      <text x="36" y="29" font-family="'JetBrains Mono', 'Fira Code', monospace"
            font-size="17" fill="#3FB950">cargo install mcp-scanner</text>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="#2F81F7" opacity="0.3"/>

  <!-- Top-right corner accent -->
  <g opacity="0.08">
    <line x1="1100" y1="0" x2="1200" y2="0" stroke="#3FB950" stroke-width="2"/>
    <line x1="1200" y1="0" x2="1200" y2="100" stroke="#3FB950" stroke-width="2"/>
  </g>
</svg>
